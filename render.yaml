services:
  - type: web
    name: resume-screening-web
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn resume_screening.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: resume-screening-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: resume-screening-redis
          property: connectionString
  - type: worker
    name: resume-screening-worker
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A resume_screening worker --loglevel=info"
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: resume-screening-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: resume-screening-redis
          property: connectionString
  - type: redis
    name: resume-screening-redis
    ipAllowList: []
databases:
  - name: resume-screening-db
    databaseName: resume_screening
    user: resume_user
