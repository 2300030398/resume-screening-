{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card">
    <div class="card-body">
        <h1 class="h4 mb-3">{{ title }}</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary">Save Job</button>
            <a class="btn btn-link" href="{% url 'recruiter:job_list' %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
