{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="aurora-bg"></div>
<div class="auth-shell">
    <div class="auth-card">
        <span class="auth-eyebrow">AI Resume Screening</span>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to review candidates and manage your hiring pipeline.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary w-100 mt-2">Sign In</button>
        </form>
        <p class="mt-4 mb-0 text-center small text-muted">
            New recruiter? <a href="{% url 'accounts:register' %}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
